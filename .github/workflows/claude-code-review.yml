---
name: Claude Code Review

# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Enable to leave comments
      issues: read
      id-token: write

    steps:
      - name: ⤵️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🤖 Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true  # ✨ Enables tracking comments
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-plugins-official'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run /code-review on this pull request.

            When you have completed the review:
            1. Use `mcp__github_inline_comment__create_inline_comment` to post
                inline comments for any specific code-level issues.
            2. Use `gh pr comment` to post a summary comment on the PR
                with an overall assessment, key findings, and any recommended
                actions for the author.

            Only post GitHub comments — do not output review text as chat messages.

          claude_args: |
            --allowedTools "Bash(gh:*),mcp__github_inline_comment__create_inline_comment"
