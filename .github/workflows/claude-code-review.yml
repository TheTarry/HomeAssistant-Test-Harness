---
name: Claude Code Review

# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  # Enable to leave comments
      issues: read
      id-token: write

    steps:
      - name: ⏳ Debounce — wait for rapid pushes to settle
        run: sleep 300

      - name: ⤵️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: 🧹 Dismiss previous Claude reviews
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          bot_login=$(gh api /user --jq '.login')
          gh api repos/$REPO/pulls/$PR_NUMBER/reviews \
            --jq ".[] | select(.user.login == "claude[bot]") | .id" \
          | while read review_id; do
              gh api "repos/$REPO/pulls/$PR_NUMBER/reviews/$review_id/dismissals" \
                --method PUT \
                --field message="Superseded by updated review" \
                --silent
            done

      - name: 🤖 Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true  # ✨ Enables tracking comments
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Run /code-review on this pull request.

            When you have completed the review, submit all findings as a single
            pull request review using the GitHub API:

            ```bash
            gh api repos/{owner}/{repo}/pulls/{number}/reviews \
              --method POST \
              --field body="<overall summary>" \
              --field event="COMMENT" \
              --field "comments[][path]=<file>" \
              --field "comments[][line]=<line>" \
              --field "comments[][body]=<comment>"
            ```

            Include all inline comments in the single API call — do not post
            them individually. Do not output review text as chat messages.

          claude_args: |
            --allowedTools "Bash(gh:*)"
