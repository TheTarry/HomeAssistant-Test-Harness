---
# Minimal Home Assistant configuration for example tests

default_config:

# Enable REST API
api:

# Enable frontend
frontend:

# Enable system health
system_health:

timer:
  # Timer entity which is referenced by example tests
  test_timer:
    duration: '00:00:05'

template:
  - triggers:
      - platform: time_pattern
        # Trigger every second to update the current datetime sensor
        seconds: "*"
    sensor:
      # Sensor to show current datetime for example test assertions
      - name: Current Datetime
        state: "{{ now().replace(microsecond=0).isoformat() }}"

automation:
  # Turns on all lights labelled 'test_label_target' when the label automation
  # trigger button is pressed. Used by label-management example tests.
  # Uses label_entities() template function so that the label must exist in the
  # label registry — this is what given_entity_has() ensures before assigning labels.
  - id: example_label_based_turn_on
    alias: "Example - Label Based Turn On"
    trigger:
      - platform: state
        entity_id: input_button.label_automation_trigger
    action:
      - action: light.turn_on
        target:
          entity_id: "{{ label_entities('test_label_target') }}"

  # Turns on all lights in the 'living_room' area when the area automation
  # trigger button is pressed. Used by area-management example tests.
  # Uses area_entities() template function so that the area must exist in the
  # area registry — this is what given_entity_has() ensures before assigning an area.
  - id: example_area_based_turn_on
    alias: "Example - Area Based Turn On"
    trigger:
      - platform: state
        entity_id: input_button.area_automation_trigger
    action:
      - action: light.turn_on
        target:
          entity_id: "{{ area_entities('test_room') }}"

  # Performance test infrastructure: introduces a 1-second delay whenever one of the
  # reserved 'perf_test' sensor entities changes state.
  #
  # Purpose: discriminate between the buggy path (hass.async_block_till_done()) and
  # the correct path (asyncio.sleep(0)) in ws_create_entity.
  #
  #   Bug  — ws_create_entity awaits async_block_till_done(), which gathers ALL asyncio
  #          tasks including this sleeping automation.  Each entity creation therefore
  #          blocks for ~1 s, making 5 creations take 5 s+.
  #
  #   Fix  — ws_create_entity yields once with asyncio.sleep(0) and returns.  The
  #          automation runs in the background; entity creation takes ~100 ms.
  #
  # The entity IDs listed here are reserved exclusively for test_performance.py.
  - id: perf_test_event_loop_probe
    alias: "Performance test - event loop probe"
    trigger:
      - platform: state
        entity_id:
          - sensor.perf_test_0
          - sensor.perf_test_1
          - sensor.perf_test_2
          - sensor.perf_test_3
          - sensor.perf_test_4
    action:
      - delay: "00:00:01"
