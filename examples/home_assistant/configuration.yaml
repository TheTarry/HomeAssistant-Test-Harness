---
# Minimal Home Assistant configuration for example tests

default_config:

# Enable REST API
api:

# Enable frontend
frontend:

# Enable system health
system_health:

timer:
  # Timer entity which is referenced by example tests
  test_timer:
    duration: '00:00:05'

template:
  - triggers:
      - platform: time_pattern
        # Trigger every second to update the current datetime sensor
        seconds: "*"
    sensor:
      # Sensor to show current datetime for example test assertions
      - name: Current Datetime
        state: "{{ now().replace(microsecond=0).isoformat() }}"

automation:
  # Turns on all entities labelled 'test_label_target' when the label automation
  # trigger button is pressed. Used by label-management example tests.
  # Uses label_entities() template function so that the label must exist in the
  # label registry — this is what given_entity_has() ensures before assigning labels.
  - id: example_label_based_turn_on
    alias: "Example - Label Based Turn On"
    trigger:
      - platform: state
        entity_id: input_button.label_automation_trigger
    action:
      - action: light.turn_on
        target:
          entity_id: "{{ label_entities('test_label_target') }}"

  # Turns on all entities in the 'living_room' area when the area automation
  # trigger button is pressed. Used by area-management example tests.
  # Uses area_entities() template function so that the area must exist in the
  # area registry — this is what given_entity_has() ensures before assigning an area.
  - id: example_area_based_turn_on
    alias: "Example - Area Based Turn On"
    trigger:
      - platform: state
        entity_id: input_button.area_automation_trigger
    action:
      - action: light.turn_on
        target:
          entity_id: "{{ area_entities('living_room') }}"
